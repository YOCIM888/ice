<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>冰封王国 · 设置</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      font-family: 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
      background: #0b1a26 url('../image/main/冰封王国.png') no-repeat center center fixed;
      background-size: cover;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #eaf3ff;
    }
    .settings-container {
      width: 100%;
      max-width: 420px;
      min-height: 100vh;
      margin: 0 auto;
      background: rgba(6, 22, 35, 0.5);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      box-shadow: 0 0 30px #00000060;
      padding: 20px 16px 30px;
      display: flex;
      flex-direction: column;
      gap: 18px;
      border-left: 1px solid rgba(180, 215, 255, 0.2);
      border-right: 1px solid rgba(180, 215, 255, 0.2);
    }
    h2 {
      text-align: center;
      color: #e3f0ff;
      text-shadow: 0 4px 8px black;
      letter-spacing: 4px;
      font-weight: 400;
      border-bottom: 1px solid #3b7096;
      padding-bottom: 12px;
    }
    /* 头像区 */
    .avatar-section {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
    }
    .avatar-preview {
      width: 90px;
      height: 90px;
      border-radius: 50%;
      border: 3px solid #7fb7e0;
      box-shadow: 0 0 20px #3f8db0;
      object-fit: cover;
      background: #132c3f;
      cursor: pointer;
    }
    .upload-hint {
      font-size: 0.8rem;
      color: #b0d0f0;
    }
    /* 表单项 */
    .form-group {
      display: flex;
      flex-direction: column;
      gap: 6px;
      background: rgba(10, 30, 45, 0.6);
      padding: 12px 16px;
      border-radius: 28px;
      border: 1px solid #3f78a0;
      backdrop-filter: blur(4px);
    }
    .form-label {
      font-size: 0.9rem;
      color: #c6e2ff;
      letter-spacing: 1px;
    }
    .form-input {
      background: rgba(0, 0, 0, 0.3);
      border: 1px solid #2e6a92;
      border-radius: 40px;
      padding: 10px 16px;
      color: white;
      font-size: 1rem;
      outline: none;
    }
    .form-input:focus {
      border-color: #8ec9ff;
      box-shadow: 0 0 8px #3f9eff;
    }
    .radio-group {
      display: flex;
      gap: 24px;
      align-items: center;
    }
    .radio-group label {
      display: flex;
      align-items: center;
      gap: 6px;
      color: #d6eaff;
    }
    .static-text {
      padding: 10px 16px;
      color: #f0f9ff;
      font-weight: 500;
    }
    /* 按钮 */
    .btn {
      background: linear-gradient(145deg, #2e6c9e, #1a3f5c);
      border: 1px solid #7bb2e0;
      border-radius: 60px;
      padding: 14px 18px;
      color: white;
      font-weight: bold;
      font-size: 1.1rem;
      text-align: center;
      cursor: pointer;
      box-shadow: 0 5px 0 #0f1f2e, 0 4px 10px black;
      transition: 0.08s;
      margin-top: 10px;
    }
    .btn:active {
      transform: translateY(3px);
      box-shadow: 0 2px 0 #0f1f2e, 0 4px 10px black;
    }
    .logout-btn {
      background: linear-gradient(145deg, #5e3a3a, #3a1e1e);
      border-color: #c08b8b;
      box-shadow: 0 5px 0 #2a1515, 0 4px 10px black;
    }
    #message {
      min-height: 24px;
      color: #ffc6a8;
      text-align: center;
    }
  </style>
</head>
<body>
<div class="settings-container">
  <h2>⚙️ 王国档案 ⚙️</h2>

  <!-- 头像上传 -->
  <div class="avatar-section">
    <img id="avatarPreview" class="avatar-preview" src="../image/main/平民头像.png" alt="头像">
    <span class="upload-hint">点击头像更换</span>
    <input type="file" id="avatarUpload" accept="image/*" style="display: none;">
  </div>

  <!-- 昵称 -->
  <div class="form-group">
    <label class="form-label"> 昵称</label>
    <input type="text" id="nicknameInput" class="form-input" placeholder="输入你的昵称" maxlength="12">
  </div>

  <!-- 性别 -->
  <div class="form-group">
    <label class="form-label">⚥ 性别</label>
    <div class="radio-group">
      <label><input type="radio" name="gender" value="男"> 男</label>
      <label><input type="radio" name="gender" value="女"> 女</label>
      <label><input type="radio" name="gender" value="保密"> 保密</label>
    </div>
  </div>

  <!-- 账号ID（不可编辑） -->
  <div class="form-group">
    <label class="form-label"> 账号ID</label>
    <div class="static-text" id="accountIdDisplay">loading...</div>
  </div>

  <!-- 个性签名 -->
  <div class="form-group">
    <label class="form-label">✏️ 个性签名</label>
    <input type="text" id="signatureInput" class="form-input" placeholder="写点什么..." maxlength="30">
  </div>

  <!-- 注册时间 -->
  <div class="form-group">
    <label class="form-label"> 注册时间</label>
    <div class="static-text" id="regTimeDisplay">-</div>
  </div>

  <!-- 保存按钮 -->
  <button class="btn" id="saveSettingsBtn"> 保存设置</button>
  <div id="message"></div>

  <!-- 退出登录 -->
  <button class="btn logout-btn" id="logoutBtn"> 退出登录</button>
</div>

<script>
  (function(){
    "use strict";
    const STORAGE_ACCOUNTS = 'frozen_kingdom_accounts';
    const STORAGE_CURRENT_USER = 'frozen_current_user';

    // DOM
    const avatarPreview = document.getElementById('avatarPreview');
    const avatarUpload = document.getElementById('avatarUpload');
    const nicknameInput = document.getElementById('nicknameInput');
    const genderRadios = document.querySelectorAll('input[name="gender"]');
    const accountIdDisplay = document.getElementById('accountIdDisplay');
    const signatureInput = document.getElementById('signatureInput');
    const regTimeDisplay = document.getElementById('regTimeDisplay');
    const saveBtn = document.getElementById('saveSettingsBtn');
    const logoutBtn = document.getElementById('logoutBtn');
    const messageEl = document.getElementById('message');

    let currentUser = null;
    let accounts = {};
    let currentAvatarBase64 = null; // 暂存新上传的头像

    // 加载账户
    function loadAccounts() {
      const stored = localStorage.getItem(STORAGE_ACCOUNTS);
      accounts = stored ? JSON.parse(stored) : {};
    }
    function saveAccounts() {
      localStorage.setItem(STORAGE_ACCOUNTS, JSON.stringify(accounts));
    }
    function getCurrentUser() {
      return localStorage.getItem(STORAGE_CURRENT_USER);
    }

    // 初始化用户数据扩展字段
    function initUserData() {
      if (!currentUser || !accounts[currentUser]) return;
      const data = accounts[currentUser];
      if (!data.registrationTime) data.registrationTime = Date.now();
      if (data.nickname === undefined) data.nickname = '';
      if (data.gender === undefined) data.gender = '保密';
      if (data.signature === undefined) data.signature = '';
      if (!data.achievements) data.achievements = {};
      // 头像自定义字段
      if (data.customAvatar === undefined) data.customAvatar = '';
      // 检查资料完整度 (头像、昵称、性别、签名) —— 头号玩家成就
      const isProfileComplete = !!(data.customAvatar && data.nickname && data.gender && data.signature);
      if (isProfileComplete) data.profileCompleted = true;
      saveAccounts();
    }

    // 渲染界面
    function renderSettings() {
      if (!currentUser || !accounts[currentUser]) {
        messageEl.textContent = '账户异常，请重新登录';
        return;
      }
      const userData = accounts[currentUser];
      
      // 头像
      if (userData.customAvatar) {
        avatarPreview.src = userData.customAvatar;
      } else {
        const charClass = userData.characterClass || '平民';
        avatarPreview.src = `../image/main/${charClass}头像.png`;
      }
      
      nicknameInput.value = userData.nickname || '';
      // 性别
      genderRadios.forEach(r => { if (r.value === userData.gender) r.checked = true; });
      accountIdDisplay.textContent = currentUser;
      signatureInput.value = userData.signature || '';
      
      const regDate = new Date(userData.registrationTime).toLocaleDateString('zh-CN');
      regTimeDisplay.textContent = regDate;
    }

    // 头像上传
    avatarPreview.addEventListener('click', () => avatarUpload.click());
    avatarUpload.addEventListener('change', (e) => {
      const file = e.target.files[0];
      if (file) {
        const reader = new FileReader();
        reader.onload = (ev) => {
          avatarPreview.src = ev.target.result;
          currentAvatarBase64 = ev.target.result;
        };
        reader.readAsDataURL(file);
      }
    });

    // 保存设置
    saveBtn.addEventListener('click', () => {
      if (!currentUser) return;
      const userData = accounts[currentUser];
      
      const nickname = nicknameInput.value.trim();
      if (!nickname) { messageEl.textContent = '昵称不能为空'; return; }
      
      let gender = '保密';
      genderRadios.forEach(r => { if (r.checked) gender = r.value; });
      const signature = signatureInput.value.trim();
      
      // 更新数据
      userData.nickname = nickname;
      userData.gender = gender;
      userData.signature = signature;
      if (currentAvatarBase64) {
        userData.customAvatar = currentAvatarBase64;
        currentAvatarBase64 = null;
      }
      
      // 重新计算头号玩家成就
      const isComplete = !!(userData.customAvatar && userData.nickname && userData.gender && userData.signature);
      userData.profileCompleted = isComplete;
      
      saveAccounts();
      messageEl.textContent = '✅ 设置已保存';
    });

    // 退出登录
    logoutBtn.addEventListener('click', () => {
      localStorage.removeItem(STORAGE_CURRENT_USER);
      window.location.href = '../index.html';
    });

    // 初始化
    function init() {
      currentUser = getCurrentUser();
      if (!currentUser) {
        messageEl.textContent = '未登录，将返回首页';
        setTimeout(() => window.location.href = '../index.html', 1500);
        return;
      }
      loadAccounts();
      if (!accounts[currentUser]) {
        messageEl.textContent = '账户数据丢失';
        return;
      }
      initUserData();
      renderSettings();
    }
    init();
  })();
</script>
</body>
</html>
