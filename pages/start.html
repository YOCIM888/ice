<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>冰封王国 · 命途抉择</title>
  <!-- 样式文件位于 asset/style/start.css -->
  <link rel="stylesheet" href="../asset/style/start.css">
</head>
<body>
<div class="role-container">
  <!-- 冰霜标题 -->
  <div class="page-header">
    <h1 class="page-title">⚔️ 英魂抉择 ⚔️</h1>
    <p class="page-sub">凛冬已至 · 踏上你的传奇</p>
  </div>

  <!-- 主内容区: 左侧职业列表 + 右侧展示 -->
  <div class="main-panel">
    <!-- 左侧: 七个职业按钮 -->
    <div class="class-list">
      <button class="class-btn" data-class="狂战">狂战</button>
      <button class="class-btn" data-class="游侠">游侠</button>
      <button class="class-btn" data-class="牧师">牧师</button>
      <button class="class-btn" data-class="法师">法师</button>
      <button class="class-btn" data-class="盾骑">盾骑</button>
      <button class="class-btn" data-class="武僧">武僧</button>
      <button class="class-btn" data-class="平民">平民</button>
    </div>

    <!-- 右侧展示区 -->
    <div class="class-showcase">
      <!-- 上区: 立绘 4:3 -->
      <div class="portrait-box">
        <img id="classPortrait" src="../image/role/狂战.png" alt="职业立绘" class="portrait-img">
      </div>

      <!-- 下区: 左六维 + 右故事 -->
      <div class="info-row">
        <!-- 六维图区域 -->
        <div class="stats-panel">
          <h3 class="stats-title">❄️ 六维 · 天命 ❄️</h3>
          <div class="stats-list" id="statsList">
            <!-- 动态由js生成 -->
          </div>
        </div>

        <!-- 职业故事 -->
        <div class="story-panel">
          <h3 class="story-title"> 霜落之章</h3>
          <p id="classStory" class="story-text">北境的风雪掩埋了无数英雄的足迹，而你将在此刻做出抉择……</p>
        </div>
      </div>
    </div>
  </div>

  <!-- 底部按钮 -->
  <div class="footer-actions">
    <button class="btn-journey" id="startJourneyBtn">❄️ 踏上旅程 ❄️</button>
    <div id="journeyMessage" class="message-hint"></div>
  </div>
</div>

<!-- 脚本位于 asset/script/start.js -->
<script src="../asset/script/start.js"></script>
</body>
</html>
